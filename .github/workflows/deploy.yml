name: Deploy Flutter Web App
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Flutter Framework
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Initialize Project Structure
        run: |
          mkdir -p lib web
          if [ -f main.dart ]; then
            mv main.dart lib/main.dart
          fi
          
          cat << 'EOF' > web/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <base href="$FLUTTER_BASE_HREF">
            <meta charset="UTF-8">
            <title>Group 17 Habit Tracker</title>
          </head>
          <body>
            <script src="flutter_bootstrap.js" async></script>
          </body>
          </html>
          EOF

      - name: Build Web Target
        run: |
          flutter config --enable-web
          flutter pub get
          flutter build web --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy Web Production Files
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
